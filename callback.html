<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>TikTok Auth Callback</title></head>
<body style="font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;">
<h1>TikTok Authorization Complete</h1>
<p>You can close this tab and return to the demo.</p>
<p id="code" style="background:#f0f0f0;padding:10px;border-radius:6px;word-break:break-all;"></p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
if(code) document.getElementById('code').textContent = 'Authorization code: ' + code;
else document.getElementById('code').textContent = 'No code received';
</script>
</body>
</html>
